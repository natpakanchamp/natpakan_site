<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-linear Feature Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1e1e1e;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .control-group { margin-bottom: 15px; }
        .control-group:last-child { margin-bottom: 0; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; }
        input[type=range] { width: 100%; cursor: pointer; }
        .button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            transition: background 0.2s;
        }
        .button:hover { background: #0056b3; }
        .button.active { background: #28a745; }
        .hint { font-size: 12px; color: #aaa; margin-top: 15px; max-width: 250px; line-height: 1.4; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="controls">
        <div class="control-group">
            <label for="z-slider">แปลงมิติ Non-linear (Z-Axis)</label>
            <input type="range" id="z-slider" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="control-group">
            <button id="plane-toggle" class="button">แทรกระนาบแบ่ง (Hyperplane)</button>
        </div>
        <div class="hint">
            เลื่อนสไลเดอร์เพื่อยกมิติข้อมูลด้วยฟังก์ชัน <strong>z = x² + y²</strong> จะเห็นได้ว่าข้อมูลที่เคยซ้อนทับกันใน 2 มิติ สามารถใช้ระนาบเรียบๆ ตัดแบ่งคลาสได้ทันที
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1e1e1e, 0.03);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(12, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const particleCount = 500;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const targetZ = new Float32Array(particleCount);

        const colorInner = new THREE.Color(0xff3333);
        const colorOuter = new THREE.Color(0x3388ff);

        for (let i = 0; i < particleCount; i++) {
            const isInner = i < particleCount / 2;
            const radius = isInner ? Math.random() * 2.5 : 4.5 + Math.random() * 2.5;
            const theta = Math.random() * Math.PI * 2;

            const x = radius * Math.cos(theta);
            const y = radius * Math.sin(theta);

            positions[i * 3] = x;
            positions[i * 3 + 1] = 0;
            positions[i * 3 + 2] = y;

            targetZ[i] = (x * x + y * y) * 0.12;

            const color = isInner ? colorInner : colorOuter;
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({ size: 0.35, vertexColors: true });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        const planeGeo = new THREE.PlaneGeometry(25, 25);
        const planeMat = new THREE.MeshBasicMaterial({
            color: 0x00ff88,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.3
        });
        const hyperplane = new THREE.Mesh(planeGeo, planeMat);
        hyperplane.rotation.x = Math.PI / 2;
        hyperplane.position.y = 1.6;
        hyperplane.visible = false;
        scene.add(hyperplane);

        const gridHelper = new THREE.GridHelper(30, 30, 0x444444, 0x222222);
        scene.add(gridHelper);

        let currentTransform = 0;
        document.getElementById('z-slider').addEventListener('input', (e) => {
            currentTransform = parseFloat(e.target.value);
        });

        const planeBtn = document.getElementById('plane-toggle');
        planeBtn.addEventListener('click', () => {
            hyperplane.visible = !hyperplane.visible;
            planeBtn.classList.toggle('active');
        });

        function animate() {
            requestAnimationFrame(animate);

            const positionsAttr = geometry.attributes.position;
            for (let i = 0; i < particleCount; i++) {
                positionsAttr.array[i * 3 + 1] = targetZ[i] * currentTransform;
            }
            positionsAttr.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
