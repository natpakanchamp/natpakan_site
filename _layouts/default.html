<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body{% if page.categories contains 'notes' %} class="notes-page"{% elsif page.permalink == '/notebook/' %} class="notes-page"{% endif %}>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <script src="{{ '/assets/js/headroom.min.js' | relative_url }}"></script>
    <script>
      (function () {
        var header = document.querySelector('.site-header');
        if (header && window.Headroom) {
          new Headroom(header, {
            offset: 80,
            tolerance: { up: 5, down: 0 }
          }).init();
        }
      })();
    </script>

    <script src="{{ '/assets/js/slider.js' | relative_url }}" defer></script>

    {% if page.page_js %}
      <script src="{{ page.page_js | relative_url }}"></script>
    {% endif %}
  </body>

</html>
